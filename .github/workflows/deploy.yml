# Continuous deployment generated by secretkit (Cloudflare host). On push to a
# deploy branch this runs the test gate, then deploys for the matching env. The
# two deploy bootstrap creds are GitHub *Environment* secrets (from 1Password);
# public bundle vars come from committed .env.<mode> files, not secrets.

name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: bun install --frozen-lockfile

      - name: Test gate
        run: bun run test

      - name: Deploy
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          BUILD_MODE: production
        run: |
          bunx convex deploy
          bun run build:"$BUILD_MODE" || bun run build
          bunx wrangler deploy
